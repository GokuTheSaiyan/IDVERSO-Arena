<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDVERSO Arena</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <!-- ===== MENU SCREEN ===== -->
  <div id="menu-screen" class="screen active">
    <h1 class="menu-title">IDVERSO Arena</h1>
    
    <div class="mode-selector">
      <div class="mode-label">Game Mode:</div>
      <button class="mode-btn active" id="mode-standard">Standard Battle</button>
      <button class="mode-btn" id="mode-triple">Triple Threat</button>
    </div>

    <div class="menu-layout" id="menu-layout">
      <div class="player-panel player-a">
        <div class="panel-header">
          <h2>Player A</h2>
          <button class="btn-random" data-player="A">Random</button>
        </div>
        <div class="character-list" id="list-a"></div>
      </div>

      <div class="preview-panel">
        <h2>Battle Preview</h2>
        <div class="preview-fighter" id="preview-a">
          <div class="preview-placeholder">Select Fighter</div>
        </div>
        <div class="preview-vs">VS</div>
        <div class="preview-fighter" id="preview-b">
          <div class="preview-placeholder">Select Fighter</div>
        </div>
        <div class="preview-vs" id="preview-vs-2" style="display: none;">VS</div>
        <div class="preview-fighter" id="preview-c" style="display: none;">
          <div class="preview-placeholder">Select Fighter</div>
        </div>
        
        <div class="scenario-selector">
          <label for="scenario-select">Arena Scenario:</label>
          <select id="scenario-select">
            <option value="default">Default Arena</option>
            <option value="small">Small Arena</option>
            <option value="compact">Compact Arena</option>
          </select>
        </div>
      </div>

      <div class="player-panel player-b">
        <div class="panel-header">
          <h2>Player B</h2>
          <button class="btn-random" data-player="B">Random</button>
        </div>
        <div class="character-list" id="list-b"></div>
      </div>

      <div class="player-panel player-c" id="panel-c" style="display: none;">
        <div class="panel-header">
          <h2>Player C</h2>
          <button class="btn-random" data-player="C">Random</button>
        </div>
        <div class="character-list" id="list-c"></div>
      </div>
    </div>
    <button class="start-btn" id="start-btn" disabled>Select Both Fighters</button>
  </div>

  <!-- ===== BATTLE SCREEN ===== -->
  <div id="battle-screen" class="screen">
    <div class="battle-header">
      <span id="battle-name-a">Fighter A</span>
      <span class="vs-label">VS</span>
      <span id="battle-name-b">Fighter B</span>
      <span class="vs-label" id="battle-vs-2" style="display: none;">VS</span>
      <span id="battle-name-c" style="display: none;">Fighter C</span>
    </div>
    <div class="battle-content">
      <canvas id="canvas" width="700" height="700"></canvas>
      <div class="battle-log-panel">
        <div class="stat-section" id="hp-section"></div>
        <div class="stat-section" id="det-section"></div>
        <div class="battle-log-title">Battle Log</div>
        <div class="battle-log" id="battle-log"></div>
      </div>
      <div class="debug-panel" id="debug-panel">
        <div class="debug-login">
          <h3>Developer Access</h3>
          <input type="text" id="debug-user" placeholder="Username" autocomplete="off">
          <input type="password" id="debug-pass" placeholder="Password" autocomplete="off">
          <button id="debug-login-btn">Login</button>
          <div id="debug-error"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== COUNTDOWN OVERLAY ===== -->
  <div class="countdown-overlay" id="countdown-overlay">
    <div class="countdown-number" id="countdown-num">3</div>
  </div>

  <!-- ===== WINNER OVERLAY ===== -->
  <div class="winner-overlay" id="winner-overlay">
    <div class="winner-box">
      <div class="winner-label">Winner</div>
      <div class="winner-name" id="winner-name">FIGHTER A</div>
      <div class="winner-stats" id="winner-stats"></div>
      <div class="winner-buttons">
        <button class="btn btn-primary" id="rematch-btn">Rematch</button>
        <button class="btn" id="charselect-btn">Character Select</button>
      </div>
    </div>
  </div>

</div>

<script src="js/audio.js"></script>
<script src="js/effects.js"></script>
<script src="js/fighters.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
